<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradient -->
  <defs>
    <linearGradient id="mdmGradient" x1="0%" y1="0%" x2="135%" y2="135%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c5cfc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#mdmGradient)" stroke-width="3" opacity="0.3"/>
  
  <!-- M - geometric -->
  <path d="M 50 140 L 50 70 L 75 100 L 100 70 L 100 140" fill="none" stroke="url(#mdmGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- D - geometric -->
  <path d="M 120 70 L 120 140 Q 145 105 120 70" fill="none" stroke="url(#mdmGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Center dot accent -->
  <circle cx="100" cy="100" r="4" fill="url(#mdmGradient)"/>
</svg>